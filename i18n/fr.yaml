- id: modell_einzel_desc
  translation: "Le modèle Agrammon pour les exploitations individuelles se base sur des paramètres et des processus bien documentés scientifiquement. Il permet d'entrer les données principales de l'exploitation agricole et ne nécessite que des paramètres connus de l'agriculteur, sans recherche particulière."

- id: modell_regional_desc
  translation: "Le modèle régional permet de calculer les émissions d'ammoniac agricoles au niveau régional. Il se base sur le modèle pour les exploitations individuelles, mais permet d'introduire des données régionales (nombre d'animaux, fréquence des techniques de production utilisées dans la région). Les calculs utilisent le même algorithme que le modèle individuel."

- id: modell_kantonal_desc
  translation: "Le modèle pour les exploitations individuelles avec adaptations cantonales est destiné à des utilisations cantonales, p.ex. le traitement de demandes de permis de construire. Il se base sur la version standard et contient des mesures supplémentaires de réduction des émissions ainsi qu'une fonction d'envoi de données à l'office cantonal concerné."

- id: modell_kantonal_note
  translation: "Cette variante est gelée et sera mise hors service en 2028."
